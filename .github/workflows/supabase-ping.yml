# Houdt je gratis Supabase-project wakker (pauzestand na 7 dagen zonder activiteit).
# Draait elke 5 dagen automatisch, en stuurt een klein verzoekje naar je database.
name: Supabase wakker houden

on:
  schedule:
    - cron: "0 8 */5 * *"   # elke 5 dagen om 08:00 UTC
  workflow_dispatch:          # ook handmatig te starten via GitHub → Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/tekeningen?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            && echo "Supabase is wakker ✓"
